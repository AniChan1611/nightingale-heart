<!DOCTYPE html>
<html>
<head>
  <title>Nightingale Heart</title>

  <style>
    body {
      margin: 0;
      background: #0b1a3c;
      color: white;
      text-align: center;
      font-family: Arial;
    }

    h1 {
      margin-top: 20px;
    }

    #counter {
      font-size: 28px;
      margin-bottom: 10px;
    }

    #heart-container {
      position: relative;
      width: 600px;
      height: 600px;
      margin: auto;
    }

    .heart {
      width: 12px;
      height: 12px;
      background: red;
      position: absolute;
      transform: rotate(45deg);
      animation: floatIn 0.8s ease forwards;
    }

    @keyframes floatIn {
      from {
        transform: translateY(-200px) scale(0.3) rotate(45deg);
        opacity: 0;
      }
      to {
        transform: translateY(0px) scale(1) rotate(45deg);
        opacity: 1;
      }
    }
  </style>
</head>

<body>

<h1>Nightingale Pledge</h1>
<h2 id="counter">Loading...</h2>

<div id="heart-container"></div>

<script>

const sheetURL = "PASTE_YOUR_CSV_LINK_HERE";

async function loadData() {
  const response = await fetch(sheetURL);
  const text = await response.text();

  // CLEAN + ACCURATE DATA FILTER
  const rows = text.split("\n")
    .slice(1)
    .filter(row => {
      const cols = row.split(",");
      return cols[0] && cols[0].trim() !== "";
    });

  const count = rows.length;

  document.getElementById("counter").innerText =
    count + " Nurses Joined";

  const container = document.getElementById("heart-container");
  container.innerHTML = "";

  rows.forEach((row, i) => {

    const heart = document.createElement("div");
    heart.className = "heart";

    // HEART SHAPE FORMULA ❤️
    const t = i * 0.15;

    const x = 16 * Math.pow(Math.sin(t), 3);
    const y =
      13 * Math.cos(t) -
      5 * Math.cos(2 * t) -
      2 * Math.cos(3 * t) -
      Math.cos(4 * t);

    const scale = 10;

    heart.style.left = 300 + x * scale + "px";
    heart.style.top = 300 - y * scale + "px";

    container.appendChild(heart);
  });
}

// REFRESH EVERY 5 SECONDS
setInterval(loadData, 5000);

// INITIAL LOAD
loadData();

</script>

</body>
</html>
